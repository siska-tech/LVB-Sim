# ─────────────────────────────────────────────────
# LVB-Sim サンプル: BassLock デモ
#
# Phase 2 検証用。BassLock モードで疑似 4ch を体験。
# VCH1: リードメロディ (Twinkle Twinkle ベース)
# VCH2: ベースライン (C メジャーコード根音)
# VCH3: 和音 (コードトーン)
# VCH4: パーカッション (クリック)
# ─────────────────────────────────────────────────
title: "BassLock Demo (Pseudo 4CH)"
